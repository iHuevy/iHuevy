<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>iHuevy</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Inter",sans-serif;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* VIDEO */

#bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* OLD TV EFFECT */

.tv-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.05) 0px,
rgba(255,255,255,0.05) 1px,
transparent 2px,
transparent 4px
);

pointer-events:none;
z-index:-1;
}

/* SOUND BUTTON */

#sound-btn{

position:fixed;
bottom:25px;
right:25px;

width:50px;
height:50px;

border-radius:12px;

background:rgba(255,255,255,0.05);

border:1px solid rgba(255,255,255,0.2);

color:white;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
}

.logo{

font-size:24px;
font-weight:800;
color:white;

}

/* LINKS */

.nav-links{
display:flex;
gap:25px;
}

.nav-links a{

position:relative;

text-decoration:none;
color:white;

padding:10px 20px;

border-radius:12px;

background:rgba(255,255,255,0.05);

border:1px solid rgba(255,255,255,0.1);

}

/* underline */

.nav-links a::after{

content:"";

position:absolute;

left:50%;
bottom:-6px;

width:0;
height:2px;

background:white;

transform:translateX(-50%);

transition:0.3s;

}

.nav-links a:hover::after{
width:60%;
}

.nav-links a.active::after{
width:60%;
}

/* HERO */

.hero{

display:flex;
align-items:center;
justify-content:space-between;

padding:120px 8%;
flex-wrap:wrap;

}

.hero-text{
max-width:550px;
}

/* MINECRAFT FONT */

.minecraft-font{
font-family:'Minecraftia', monospace;
letter-spacing:2px;
}

/* TITLE */

.hero-text h1{

font-size:64px;

text-shadow:
0 0 10px rgba(255,255,255,0.6),
0 0 20px rgba(255,255,255,0.3);

}

/* TEXT */

.hero-text p{

margin-top:20px;
color:#ccc;
line-height:1.6;

}

/* BUTTON */

.btn{

display:inline-block;
margin-top:30px;

padding:14px 28px;

background:white;
color:black;

font-weight:600;

border-radius:10px;

text-decoration:none;

}

/* PROFILE IMAGE */

.avatar{

width:320px;
height:320px;

border-radius:50%;
overflow:hidden;

border:2px solid white;

box-shadow:0 0 25px rgba(255,255,255,0.6);

}

.avatar img{

width:100%;
height:100%;
object-fit:cover;

}

/* SOCIALS */

.socials{

margin-top:30px;
display:flex;
gap:15px;

}

/* ITEM */

.social-item{
position:relative;
}

/* ICON */

.social-item a{

width:45px;
height:45px;

display:flex;
align-items:center;
justify-content:center;

border-radius:12px;

background:rgba(255,255,255,0.05);

border:1px solid rgba(255,255,255,0.2);

color:white;

font-size:20px;

transition:0.3s;

}

/* HOVER */

.social-item a:hover{

background:rgba(255,255,255,0.2);

box-shadow:0 0 15px rgba(255,255,255,0.6);

}

/* POPUP */

.social-popup{

position:absolute;

top:55px;
left:50%;

transform:translateX(-50%) scale(0.9);

background:rgba(0,0,0,0.9);

border:1px solid rgba(255,255,255,0.2);

padding:6px 14px;

border-radius:10px;

font-size:13px;

white-space:nowrap;

opacity:0;

transition:0.25s;

}

/* SHOW POPUP */

.social-item:hover .social-popup{

opacity:1;
transform:translateX(-50%) scale(1);

}

</style>

</head>

<body>

<video autoplay muted loop playsinline id="bg-video">
<source src="background.mp4" type="video/mp4">
</video>

<div class="tv-overlay"></div>

<button id="sound-btn">
<i class="fa-solid fa-volume-xmark"></i>
</button>

<nav>

<div class="logo">iHuevy</div>

<div class="nav-links">

<a href="#" class="active">Home</a>
<a href="#skills">Skills</a>

</div>

</nav>

<section class="hero">

<div class="hero-text">

<h1 class="minecraft-font">
Minecraft Developer
</h1>

<p>
I specialize in building Minecraft servers,
creating gameplay systems and custom SMP mechanics.
</p>

<a href="#" class="btn">Let's Connect</a>

<div class="socials">

<div class="social-item">

<a href="https://instagram.com/i0lks" target="_blank">
<i class="fa-brands fa-instagram"></i>
</a>

<div class="social-popup">
i0lks
</div>

</div>

<div class="social-item">

<a href="https://github.com/ihuevy" target="_blank">
<i class="fa-brands fa-github"></i>
</a>

<div class="social-popup">
ihuevy
</div>

</div>

<div class="social-item">

<a href="#" onclick="copyDiscord()">
<i class="fa-brands fa-discord"></i>
</a>

<div class="social-popup" id="discordName">
8oeq
</div>

</div>

</div>

</div>

<div class="avatar">
<img src="profile.gif">
</div>

</section>

<script>

function copyDiscord(){

const name = document.getElementById("discordName").innerText;

navigator.clipboard.writeText(name);

alert("Discord username copied: " + name);

}

const video=document.getElementById("bg-video");
const btn=document.getElementById("sound-btn");

btn.onclick=()=>{

video.muted=!video.muted;

btn.innerHTML=video.muted
?'<i class="fa-solid fa-volume-xmark"></i>'
:'<i class="fa-solid fa-volume-high"></i>';

};

</script>

</body>
</html>
